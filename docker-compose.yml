services:
  gnosys:
    build: .
    image: gnosys-mcp
    ports:
      - "7777:7777"
    volumes:
      # Host-local named volume for the brain (~/.gnosys → /data).
      # Do NOT point this at an SMB/NFS share — it will corrupt the SQLite DB.
      - gnosys-data:/data
    environment:
      # Set a token to require `Authorization: Bearer <token>` from clients.
      - GNOSYS_SERVE_TOKEN=${GNOSYS_SERVE_TOKEN:-}
      # Optional: provider key for server-side embeddings / LLM features.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    # Default CMD runs `serve --transport http --host 0.0.0.0 --port 7777`.

volumes:
  gnosys-data:
